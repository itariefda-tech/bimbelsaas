name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    name: Backend Tests and Staging Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bimbelsaas_ci
          POSTGRES_USER: bimbelsaas
          POSTGRES_PASSWORD: bimbelsaas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bimbelsaas -d bimbelsaas_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          npm ci
          npx playwright install --with-deps chromium

      - name: Compile Python sources
        run: python -m compileall app.py backend/app backend/tests backend/migrations scripts

      - name: Run test suite
        run: python -m pytest -q

      - name: Validate local operational CLI
        env:
          APP_ENV: development
          DATABASE_URL: sqlite:///dev.db
          OBSERVABILITY_LOG_REQUESTS: "false"
        run: |
          python scripts/manage.py init-db
          python scripts/manage.py seed-demo
          python scripts/manage.py smoke-check

      - name: Run UI quality gate
        env:
          APP_ENV: development
          DATABASE_URL: sqlite:///dev.db
          OBSERVABILITY_LOG_REQUESTS: "false"
        run: npm run ui:quality

      - name: Run frontend readiness gate
        env:
          APP_ENV: development
          DATABASE_URL: sqlite:///dev.db
          OBSERVABILITY_LOG_REQUESTS: "false"
          GITHUB_ACTIONS_GREEN: "true"
        run: npm run frontend:readiness

      - name: Upload UI quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-quality
          path: artifacts/ui-quality

      - name: Upload frontend readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-readiness
          path: artifacts/frontend-readiness

      - name: Validate PostgreSQL staging migrations
        env:
          APP_ENV: staging
          SECRET_KEY: ci-staging-secret-key-with-at-least-32-bytes
          DATABASE_URL: postgresql+psycopg://bimbelsaas:bimbelsaas@localhost:5432/bimbelsaas_ci
          REDIS_URL: redis://localhost:6379/0
          RATE_LIMIT_ENABLED: "true"
          CACHE_ENABLED: "true"
          OBSERVABILITY_LOG_REQUESTS: "false"
        run: python scripts/validate_staging_postgres.py

      - name: Run strict frontend readiness gate
        env:
          APP_ENV: development
          DATABASE_URL: sqlite:///dev.db
          OBSERVABILITY_LOG_REQUESTS: "false"
          GITHUB_ACTIONS_GREEN: "true"
          POSTGRES_STAGING_VALIDATED: "true"
          FRONTEND_READINESS_STRICT: "true"
        run: npm run frontend:readiness

      - name: Upload final frontend readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-readiness-final
          path: artifacts/frontend-readiness
