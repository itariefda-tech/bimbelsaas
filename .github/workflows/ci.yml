name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    name: Backend Tests and Staging Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bimbelsaas_ci
          POSTGRES_USER: bimbelsaas
          POSTGRES_PASSWORD: bimbelsaas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bimbelsaas -d bimbelsaas_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall app.py backend/app backend/tests backend/migrations scripts

      - name: Run test suite
        run: python -m pytest -q

      - name: Validate local operational CLI
        env:
          APP_ENV: development
          DATABASE_URL: sqlite:///dev.db
          OBSERVABILITY_LOG_REQUESTS: "false"
        run: |
          python scripts/manage.py init-db
          python scripts/manage.py seed-demo
          python scripts/manage.py smoke-check

      - name: Validate PostgreSQL staging migrations
        env:
          APP_ENV: staging
          SECRET_KEY: ci-staging-secret-key-with-at-least-32-bytes
          DATABASE_URL: postgresql+psycopg://bimbelsaas:bimbelsaas@localhost:5432/bimbelsaas_ci
          REDIS_URL: redis://localhost:6379/0
          RATE_LIMIT_ENABLED: "true"
          CACHE_ENABLED: "true"
          OBSERVABILITY_LOG_REQUESTS: "false"
        run: python scripts/validate_staging_postgres.py
