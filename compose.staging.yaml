services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bimbelsaas_staging
      POSTGRES_USER: bimbelsaas
      POSTGRES_PASSWORD: bimbelsaas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bimbelsaas -d bimbelsaas_staging"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./storage/staging-backups:/backups
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis_staging_data:/data

volumes:
  postgres_staging_data:
  redis_staging_data:
