services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bimbelsaas
      POSTGRES_USER: bimbelsaas
      POSTGRES_PASSWORD: bimbelsaas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bimbelsaas -d bimbelsaas"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

