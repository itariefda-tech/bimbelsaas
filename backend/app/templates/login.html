{% extends "base.html" %}

{% block title %}Login - BimbelSaaS{% endblock %}

{% block content %}
  <section class="login-panel">
    <div>
      <p class="eyebrow">Runnable MVP</p>
      <h1>Premium Academic Operations</h1>
      <p class="lead">Login demo untuk memastikan server, database, role, dan dashboard shell berjalan.</p>
    </div>
    <form class="auth-form" method="post" action="{{ url_for('login_submit') }}">
      <label>
        Email
        <input name="email" type="email" value="{{ email or 'owner@example.com' }}" required autocomplete="email">
      </label>
      <label>
        Password
        <input name="password" type="password" value="password123" required autocomplete="current-password">
      </label>
      <button class="primary-button" type="submit">Login</button>
    </form>
  </section>
{% endblock %}
